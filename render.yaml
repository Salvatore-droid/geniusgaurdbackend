services:
  # Django API Server
  - type: web
    name: geniusguard-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
    startCommand: gunicorn geniusgaurd.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: geniusgaurd.settings
      - key: REDIS_URL
        fromService:
          name: geniusguard-redis
          type: redis
          property: connectionString

  # Celery Worker (processes tasks)
  - type: worker
    name: geniusguard-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A geniusgaurd worker --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: geniusguard-redis
          type: redis
          property: connectionString

  # Celery Beat (scheduled tasks)
  - type: worker
    name: geniusguard-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A geniusgaurd beat --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          name: geniusguard-redis
          type: redis
          property: connectionString

  # Redis (message broker)
  - type: redis
    name: geniusguard-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0  # Allow all connections (for development)
        description: Allow all IPs